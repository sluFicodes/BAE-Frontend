@if (!readOnly){
    <!-- Nombre y descripción -->
    <div class="my-2">
      <h4 class="text-lg font-semibold text-primary-100 dark:text-gray-300">{{ characteristic.name }}</h4>
      <markdown [ngClass]="{
        'break-all': hasLongWord(characteristic.description, 20),
        'break-words': !hasLongWord(characteristic.description, 20)
        }" class="text-gray-500 dark:text-gray-400 text-wrap break-words" [data]="characteristic.description"></markdown>
    </div>
    @if(!isDisabled){
    <!-- Slider -->
    @if (isBoolean()){
      <div class="flex items-center">
        <label class="inline-flex items-center cursor-pointer">
          <input
            type="checkbox"
            [formControl]="control"
            (change)="onControlCommit()"
            class="sr-only peer"
          />
          <div class="relative w-9 h-5 bg-gray-300 border border-gray-400 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 dark:peer-focus:ring-blue-800 rounded-full peer dark:bg-gray-600 dark:border-gray-500 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[1px] after:start-[1px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:after:border-gray-500 peer-checked:bg-blue-600 dark:peer-checked:bg-blue-600"></div>
        </label>
      </div>
    } @else if (isSlider()){
      <div class="flex items-center space-x-2">
        <input
          type="range"
          [min]="getSliderRange()?.min"
          [max]="getSliderRange()?.max"
          [formControl]="control"
          (change)="onControlCommit()"
          class="w-full h-2 bg-gray-300 border border-gray-300 rounded-lg appearance-none cursor-pointer dark:bg-gray-600 dark:border-gray-500"
        />
        <span class="min-w-24 flex justify-center text-sm text-gray-600 dark:text-gray-400">{{ control.value }} {{ getUnit() }}</span>
      </div>
    } @else {   <!-- Select -->
      <div>
        <select
          [formControl]="control"
          (change)="onControlCommit()"
          class="block w-full px-3 py-2 border border-gray-300 rounded-lg text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-300 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600"
        >
          <option
            *ngFor="let val of characteristic.productSpecCharacteristicValue"
            [ngValue]="val.value"
          >
            {{ val.value }} {{ getUnit() }}
          </option>
        </select>
      </div>
    }
    }

} @else {
  <div class="grid grid-cols-2 items-center">
    <div class="text-base font-semibold text-primary-100 dark:text-gray-400 flex justify-between content-center">{{ characteristic.name }}:</div>
    <span class="pl-4 min-w-24 flex text-sm text-gray-600 dark:text-gray-400">{{ control.value }} {{ getUnit() }}</span>
  </div>
}
