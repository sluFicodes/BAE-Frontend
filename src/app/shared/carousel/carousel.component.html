<div [class]="wrapperClass">

  <button (click)="prev()" [disabled]="!loop && index === 0" [class]="leftButtonClass">

    <fa-icon [icon]="faChevronLeft">
    </fa-icon>

  </button>


  <div class="overflow-hidden">



    <div class="flex transition-transform duration-500 ease-out" [style.transform]="trackTransform">



      <ng-content></ng-content>

    </div>

  </div>



  <button (click)="next()" [disabled]="!loop && index === maxIndex" [class]="rightButtonClass">

    <fa-icon [icon]="faChevronRight">
    </fa-icon>

  </button>

</div>



@if (pages > 1) {

<div class="mt-6 flex justify-center gap-2 sm:mt-8 md:mt-10 lg:mt-12">

  @for (i of [].constructor(pages); track $index) {

  <button (click)="goTo($index)" class="h-3 w-3 rounded-full transition" [class]="dotClass(index === $index)">
  </button>

  }

</div>

}
