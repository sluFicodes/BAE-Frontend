<div class="relative">

  <button (click)="prev()" [disabled]="index === 0"
    class="absolute -left-12 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full border bg-white shadow flex items-center justify-center transition disabled:opacity-40">
    <fa-icon [icon]="faChevronLeft"></fa-icon>
  </button>

  <div class="overflow-hidden">
    <div class="flex transition-transform duration-500" [style.transform]="trackTransform">
      <ng-content></ng-content>
    </div>
  </div>

  <button (click)="next()" [disabled]="index === maxIndex"
    class="absolute -right-12 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full border bg-white shadow flex items-center justify-center transition disabled:opacity-40">
    <fa-icon [icon]="faChevronRight"></fa-icon>
  </button>

</div>

<div class="flex justify-center gap-3 mt-12">
  @for (i of [].constructor(pages); track $index) {
  <button (click)="goTo($index)" class="w-3 h-3 rounded-full" [class.bg-blue-700]="index === $index"
    [class.bg-slate-300]="index !== $index"></button>
  }
</div>
